<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Role</title>

<style>

body{
  height:100vh;
  margin:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  background:linear-gradient(to right,#141e30,#243b55);
  font-family:Segoe UI;
  color:white;
  background: url(vemu.jpg);
  backdrop-filter: blur(4px);
  background-size: cover;
}

/* HEADER */

header{
  width:100%;
  text-align:center;
  padding:15px 0;
  font-size:40px;
  font-weight:bold;
  background:darkcyan;
  box-shadow:0 0 10px cyan;
  letter-spacing:1px;
}

/* CONTAINER CENTER */

.container{
  flex:1;
  display:grid;
  grid-template-columns:repeat(2,200px);
  gap:30px;
  align-content:center;
}

/* CARDS */

.card{
  background:white;
  padding:30px;
  text-align:center;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.08);
  background:#00c6ff;
}

.card a{
  text-decoration:none;
  color:black;
  font-weight:bold;
  font-size:16px;
}

.card:hover a{
  color:white;
}
.back{
  text-align:center;
}

.back a{
  color:blue;
  text-decoration:none;
  font-size:25px;
  margin-bottom: 20px;
  
}
.header-content{
  display:flex;
  align-items:center;
  gap:15px;
  padding-left:15px;
}

.logo{
  
  border-radius:50%;
  padding:3px;
  width:auto;
  height:auto;
}
</style>
</head>

<body>

<header>
  <div class="header-content">

    <img src="vemulogo.webp" class="logo" alt="College Logo">

    <marquee direction="left" scrollamount="10">
      VEMU INSTITUTE OF TECHNOLOGY <sub>(autonomous)</sub>
    </marquee>

  </div>
</header>
 
<div class="container">

  <div class="card"><a href="studentlogin.html">Student Login</a></div>
  <div class="card"><a href="faculty.html">Faculty Login</a></div>
  <div class="card"><a href="adminlogin.html">Admin Login</a></div>
  <div class="card"><a href="librarian.html">Librarian Login</a></div>
<div class="back">
  <a href="library.html">⬅ Back to Home</a>
</div>
</div>

</body>
</html>
