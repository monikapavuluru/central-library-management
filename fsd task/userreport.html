<!DOCTYPE html>
<html>
<head>
<title>Library Reports</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:#243b55;
color:white;
text-align:center;
padding:18px;
font-size:28px;
}

/* REPORT BOX */

.section{
width:85%;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.section h2{
text-align:center;
color:#243b55;
margin-bottom:15px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#243b55;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.back{
  text-align:center;
}

.back a{
  color:blue;
  text-decoration:none;
  font-size:25px;
  margin-bottom: 20px;
  
}
</style>
</head>

<body>

<header>
📊 Central Library Overall Reports
</header>
