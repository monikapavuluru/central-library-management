<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Librarian Login | Secure Access</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url("https://vemu.org/assets/img/library/IMG_9709.jpg") center/cover no-repeat;
  }

  header {
    width: 100%; text-align: center; padding: 20px 0; font-size: 28px; font-weight: bold;
    background: rgba(0,0,0,0.4); box-shadow: 0 0 12px aqua;
  }

  .login-box {
    margin: 80px 0; width: 360px; padding: 35px; border-radius: 15px; text-align: center;
    background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); box-shadow: 0 0 20px aqua;
  }

  .staff-only { color: #ff4d4d; font-size: 11px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }

  input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: white; color: #333; }

  button {
    width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 25px;
    background: aqua; color: black; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
  }

  .google-btn {
    background: white; color: #444; display: flex; align-items: center; justify-content: center;
    gap: 10px; width: 100%; padding: 10px; border-radius: 25px; cursor: pointer; border: none; font-weight: 600;
  }

  /* GOOGLE MODAL */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
  }

  .google-modal {
    background: white; color: #333; width: 340px; border-radius: 12px; padding: 25px; text-align: left;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .google-modal h3 { font-size: 18px; margin-bottom: 5px; text-align: center; }
  .google-modal p { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px; }

  .account-item {
    display: flex; align-items: center; padding: 12px; border: 1px solid #eee; 
    border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
  }

  .account-item:hover { background: #f0faff; border-color: aqua; }

  .account-item img { width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; }

  .account-info span { display: block; font-size: 14px; font-weight: bold; }
  .account-info small { color: #008b8b; font-size: 11px; font-weight: 600; }

  .cancel-btn { text-align: center; margin-top: 15px; font-size: 14px; color: #999; cursor: pointer; }

  #statusMsg { font-size: 12px; margin-top: 10px; font-weight: bold; color: #ff4d4d; }

</style>
</head>

<body>

<header>📚 Central Library Management</header>

<div class="login-box">
  <form onsubmit="return handleManualLogin(event)">
    <h2>Librarian Login</h2>
    <p class="staff-only">OFFICIAL STAFF ACCESS ONLY</p>
    
    <input type="text" id="libID" placeholder="Librarian ID (LIB-XXX)">
    <input type="password" id="libPass" placeholder="Password">
    
    <button type="submit">Access Dashboard</button>
    <div id="statusMsg"></div>
  </form>

  <div style="margin: 20px 0; color: #ccc; font-size: 12px;">OR</div>

  <button class="google-btn" onclick="openGoogleModal()">
    <img src="https://tse3.mm.bing.net/th/id/OIP.uBYsSL7JDekYP3VpxWZvYQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" width="50">
    Continue with Google
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="google-modal">
    <img src="" width="25" style="display:block; margin: 0 auto 10px;">
    <h3>Choose an account</h3>
    <p>to continue to Library Portal</p>
    
    <div class="account-item" onclick="autoLogin('admin.librarian@library.com')">
      <img src="https://ui-avatars.com/api/?name=Admin+Librarian&background=00ffff&color=000" alt="A">
      <div class="account-info">
        <span>Admin Librarian</span>
        <small>admin.librarian@library.com</small>
      </div>
    </div>

    <div class="account-item" onclick="autoLogin('staff.assistant@library.com')">
      <img src="https://ui-avatars.com/api/?name=Staff+Assistant&background=00ffff&color=000" alt="S">
      <div class="account-info">
        <span>Staff Assistant</span>
        <small>staff.assistant@library.com</small>
      </div>
    </div>

    <div class="cancel-btn" onclick="closeGoogleModal()">Cancel</div>
  </div>
</div>

<script>
  function openGoogleModal() {
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeGoogleModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  // Directly logs in when email is clicked
  function autoLogin(email) {
    alert("Authenticating: " + email);
    window.location.href = "trail.html";
  }

  // Manual Login Logic
  function handleManualLogin(e) {
    e.preventDefault();
    const id = document.getElementById('libID').value.trim();
    const pass = document.getElementById('libPass').value.trim();
    const msg = document.getElementById('statusMsg');

    if (id === "" || pass === "") {
        msg.innerText = "⚠️ Please fill in all fields.";
        return false;
    }

    if (id.toUpperCase().startsWith("LIB-")) {
      window.location.href = "librarian1.html";
    } else {
      msg.innerText = "❌ Access Denied: Librarians Only.";
    }
  }
</script>
 
</body>
</html>
