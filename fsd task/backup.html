<!DOCTYPE html>
<html>
<head>
<title>Backup & Restore Database</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:#243b55;
color:white;
text-align:center;
padding:18px;
font-size:28px;
}

/* MAIN CONTAINER */

.container{
width:400px;
height:300px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.container h2{
color:#243b55;
margin-bottom:20px;
}

/* BUTTONS */

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.backup{
background:#28a745;
color:white;
}

.restore{
background:#007bff;
color:white;
}

button:hover{
opacity:0.85;
}

.back{
text-align:center;
margin-top:20px;
}

.back a{
color:blue;
text-decoration:none;
font-size:20px;
}

body {
      display: flex;
      height: 100vh;
      background-color: #659b9b;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      background: #173434;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .sidebar a {
      display: block;
      color: #c7c7c7;
      text-decoration: none;
      margin: 15px 0;
      padding: 10px;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .sidebar a:hover {
      background: #2a4f4f;
      color: #fff;
    }
</style>
</head>

<body>


  <div class="sidebar">
    <h2>Library Admin</h2>
    <a href="#">Dashboard</a>
    <a href="manage.html">Manage Users</a>
    <a href="libraryrecords.html">Library Records</a>
    <a href="reports.html">Reports</a>
    <a href="backup.html">Backup&Restore Database</a>
    <a href="library.html">LOGOUT</a>
  
  </div>


<div class="container">

<h2>Database Backup and Restore</h2>

<p>The admin can create a backup of the library database or restore previous data if needed.</p>

<button class="backup" onclick="backup()">Backup Database</button>

<button class="restore" onclick="restore()">Restore Database</button>

</div>

<script>

function backup(){
alert("Database Backup Completed Successfully");
}

function restore(){
alert("Database Restored Successfully");
}

</script>



</body>
</html>
