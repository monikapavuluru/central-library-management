<!DOCTYPE html>
<html>
<head>
<title>Assign Roles</title>

<style>
body{
    background-image:url("https://cdn-icons-png.flaticon.com/512/3135/3135755.png");
    font-family: Arial;
    background: linear-gradient(to right,#4e73df,#1cc88a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:350px;
    text-align:center;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

h2{
    color:#4e73df;
}

input,select{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#4e73df;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2e59d9;
}
.message{
display:none;
color:green;
font-weight:bold;
margin-top:15px;
}

#show:target{
display:block;
}

.back{
  text-align:center;
}

.back a{
  color:blue;
  text-decoration:none;
  font-size:25px;
  margin-bottom: 20px;
  
}
</style>

</head>

<body>

<div class="container">

<h2>Assign Role to User</h2>

<form action="#show">

<input type="text" name="username" placeholder="Enter User Name" required>

<select name="role" required>
<option value="">-- Select Role --</option>
<option value="Admin">Admin</option>
<option value="Librarian">Librarian</option>
<option value="Faculty">Faculty</option>
<option value="student">student</option>
</select>
<br><br>
<button type="submit">Assign Role</button>

</form>

<h3 id="show" class="message">Role assigned successfully!</h3>
</div>
<div class="back">
  <a href="admindashboard.html">⬅ Back to Home</a>
</div>
</body>
</html>
